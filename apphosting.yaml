# Configurações para o Firebase App Hosting
# https://firebase.google.com/docs/app-hosting/configure

buildConfig:
  runtime: nodejs20

runConfig:
  # Memória e CPU garantidos para o boot estável do Next.js 15
  memory: 1024Mi
  cpu: 1
  maxInstances: 2
  # Tempo limite estendido para evitar erros 500 no primeiro acesso
  timeoutSeconds: 60
