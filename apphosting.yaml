# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# Configuração de Build para otimizar o tempo de provisionamento
buildConfig:
  runtime: nodejs20

runConfig:
  # Memória e CPU otimizados para evitar erro 500 no cold start do Next.js 15
  memory: 1024Mi
  cpu: 1
  maxInstances: 1
